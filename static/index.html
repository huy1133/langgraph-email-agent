<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Ingestion Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Mesh Gradient Background Orbs */
        .orb {
            position: absolute;
            filter: blur(80px);
            opacity: 0.5;
            z-index: 0;
            border-radius: 50%;
            animation: float 20s infinite alternate;
        }
        .orb-1 {
            width: 400px; height: 400px;
            background: #8b5cf6;
            top: -100px; left: -100px;
        }
        .orb-2 {
            width: 500px; height: 500px;
            background: #ec4899;
            bottom: -200px; right: -100px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.2); }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 900px;
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-weight: 700;
            font-size: 28px;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #c084fc, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: #94a3b8;
            font-weight: 300;
            margin-bottom: 24px;
        }

        textarea {
            width: 100%;
            height: 250px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.3);
            border-radius: 12px;
            padding: 20px;
            color: #e2e8f0;
            font-family: inherit;
            font-size: 15px;
            resize: vertical;
            outline: none;
            transition: border-color 0.3s;
        }

        textarea:focus {
            border-color: #a855f7;
            box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.2);
        }

        .actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 20px;
        }

        button {
            background: linear-gradient(135deg, #a855f7, #ec4899);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px 30px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 10px 15px -3px rgba(168, 85, 247, 0.4);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px rgba(236, 72, 153, 0.5);
        }

        button:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Spinner */
        .spinner {
            display: none;
            width: 20px; height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .terminal {
            margin-top: 30px;
            background: #020617;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            font-family: monospace;
            color: #34d399;
            height: 180px;
            overflow-y: auto;
            display: none;
        }
        .terminal p {
            margin-bottom: 5px;
            line-height: 1.4;
        }
        .terminal p.error { color: #f87171; }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <h1>RAG Data Ingestion Portal</h1>
        <p class="subtitle">Nạp văn bản thô, Email hoặc Text hội thoại (Dùng marker <code>==========</code> để chia các chunk riêng nhé)</p>

        <textarea id="rawInput" placeholder="Ví dụ:
==========
Từ khách hàng: Nguyen Van A
Nhờ báo giá dự án bên xây dựng cầu đường...
==========
..."></textarea>

        <div class="actions">
            <button id="ingestBtn" onclick="sendData()">
                <div class="spinner" id="spinner"></div>
                <span>Bắt đầu Trích xuất & Nhúng DB</span>
            </button>
        </div>

        <div class="terminal" id="terminal"></div>
    </div>

    <script>
        async function sendData() {
            const rawText = document.getElementById('rawInput').value.trim();
            const btn = document.getElementById('ingestBtn');
            const spinner = document.getElementById('spinner');
            const term = document.getElementById('terminal');
            
            if (!rawText) {
                alert("Bạn chưa nhập dữ liệu nào!");
                return;
            }

            // UI Changes
            btn.disabled = true;
            spinner.style.display = 'block';
            term.style.display = 'block';
            term.innerHTML = '<p>🚀 Khởi tạo quá trình: Đang nạp dữ liệu lên Backend HTTP...</p>';

            try {
                const response = await fetch('/api/ingest', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ raw_text: rawText })
                });

                const data = await response.json();
                
                if (response.ok) {
                    data.logs.forEach(log => {
                        term.innerHTML += `<p>> ${log}</p>`;
                    });
                    term.innerHTML += `<p style="color:#60a5fa">✨ INGESTION COMPLETE: Added ${data.chunks} Vectors.</p>`;
                } else {
                    term.innerHTML += `<p class="error">❌ ERROR: ${data.error}</p>`;
                    if (data.logs) {
                        data.logs.forEach(log => term.innerHTML += `<p>> ${log}</p>`);
                    }
                }
            } catch (error) {
                term.innerHTML += `<p class="error">❌ Mất kết nối đến Server FastAPI!</p>`;
                console.error(error);
            } finally {
                btn.disabled = false;
                spinner.style.display = 'none';
                term.scrollTop = term.scrollHeight;
            }
        }
    </script>
</body>
</html>
