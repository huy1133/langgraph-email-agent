<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MailMind AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] } } }
        };
        // FOUC prevention script
        if (localStorage.getItem('theme') === 'dark' || (!("theme" in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #d4d4d8;
            border-radius: 10px;
        }

        .dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #3f3f46;
        }

        .spinner {
            display: none;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(0, 0, 0, 0.2);
            border-top: 2px solid #000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .dark .spinner {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid #fff;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .terminal-logs p {
            margin-bottom: 4px;
            line-height: 1.5;
        }

        .terminal-logs p.error {
            color: #ef4444;
        }

        .dark .terminal-logs p.error {
            color: #f87171;
        }

        .terminal-logs p.success {
            color: #22c55e;
        }

        .dark .terminal-logs p.success {
            color: #4ade80;
        }
    </style>
</head>

<body
    class="font-sans antialiased flex h-screen overflow-hidden selection:bg-zinc-200 dark:selection:bg-zinc-800 bg-white dark:bg-[#09090b] text-zinc-900 dark:text-zinc-100 transition-colors duration-300">

    <!-- Left Sidebar Navigation -->
    <aside
        class="w-64 border-r border-zinc-200 dark:border-zinc-800/60 bg-zinc-50 dark:bg-[#09090b] shrink-0 flex flex-col items-stretch transition-colors duration-300">
        <div class="h-14 flex items-center px-6 border-b border-zinc-200 dark:border-zinc-800/60">
            <span class="font-medium text-zinc-900 dark:text-zinc-100 text-[13px] flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-zinc-400 dark:bg-white"></div>
                MailMind AI
            </span>
        </div>

        <div class="p-4 flex flex-col gap-1 items-stretch">
            <p class="text-[10px] font-semibold text-zinc-500 uppercase tracking-widest px-2 mb-2">Chức năng</p>

            <a href="/"
                class="flex items-center gap-2 px-3 py-2 text-[13px] font-medium rounded-lg text-zinc-600 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-200 hover:bg-zinc-100 dark:hover:bg-zinc-800/50 transition">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z"></path>
                </svg>
                Agent Console
            </a>

            <a href="/ingest"
                class="flex items-center gap-2 px-3 py-2 text-[13px] font-medium rounded-lg bg-zinc-200 dark:bg-zinc-800 text-zinc-900 dark:text-zinc-100 transition">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z">
                    </path>
                </svg>
                Context & Data
            </a>
        </div>

        <div class="mt-auto p-6 text-xs text-zinc-500 dark:text-zinc-600">
            LLM: <span class="text-zinc-700 dark:text-zinc-400">gemini-3-flash</span><br>
            DB: <span class="text-zinc-700 dark:text-zinc-400">Chroma Vector</span>
        </div>
    </aside>

    <!-- Main Ingest Workspace -->
    <main class="flex-1 flex flex-col h-full relative">
        <!-- Top header area for context -->
        <header
            class="h-14 border-b border-zinc-200 dark:border-zinc-800/60 flex items-center justify-between px-6 shrink-0 transition-colors">
            <span class="font-medium text-zinc-900 dark:text-zinc-100 text-[13px]">Workspace / Ingest</span>

            <button onclick="toggleTheme()"
                class="text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-200 transition p-1.5 rounded-md hover:bg-zinc-200 dark:hover:bg-zinc-800 outline-none"
                title="Toggle Theme">
                <!-- Nút Mặt Trời (Hiện trong Dark Mode) -->
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
                    class="hidden dark:block">
                    <circle cx="12" cy="12" r="4"></circle>
                    <path d="M12 2v2"></path>
                    <path d="M12 20v2"></path>
                    <path d="m4.93 4.93 1.41 1.41"></path>
                    <path d="m17.66 17.66 1.41 1.41"></path>
                    <path d="M2 12h2"></path>
                    <path d="M20 12h2"></path>
                    <path d="m6.34 17.66-1.41 1.41"></path>
                    <path d="m19.07 4.93-1.41 1.41"></path>
                </svg>
                <!-- Nút Mặt Trăng (Hiện trong Light Mode) -->
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
                    class="block dark:hidden">
                    <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
                </svg>
            </button>
        </header>

        <div class="flex-1 overflow-y-auto w-full max-w-4xl mx-auto py-10 px-6 custom-scrollbar">
            <div class="mb-6">
                <h1 class="text-lg font-medium text-zinc-900 dark:text-zinc-100 mb-1">Nạp Dữ Liệu Vector</h1>
                <p class="text-[13px] text-zinc-500">Dán trực tiếp email mộc, file log hoặc ghi chú vào bên dưới để AI
                    tự động trích xuất thực thể.</p>
            </div>

            <!-- Input Box -->
            <div class="space-y-3">
                <textarea id="rawInput" placeholder="[Copy/Paste nội dung hội thoại lộn xộn, email mộc tại đây...]"
                    class="w-full h-[250px] bg-white dark:bg-zinc-900/30 border border-zinc-200 dark:border-zinc-800 rounded-xl p-4 text-[13px] text-zinc-800 dark:text-zinc-300 placeholder:text-zinc-400 dark:placeholder:text-zinc-600 focus:outline-none focus:border-zinc-400 dark:focus:border-zinc-500 custom-scrollbar resize-none transition-colors shadow-sm dark:shadow-none"></textarea>

                <div class="flex justify-between items-center">
                    <div class="flex gap-4 items-center">
                        <button onclick="document.getElementById('rawInput').value=''"
                            class="text-[12px] text-zinc-500 hover:text-zinc-800 dark:hover:text-zinc-300 transition">Làm sạch bảng</button>
                        
                        <label for="fileUpload" class="text-[12px] text-zinc-500 hover:text-zinc-800 dark:hover:text-zinc-300 transition cursor-pointer flex items-center gap-1" title="Upload Text File">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="17 8 12 3 7 8"></polyline>
                                <line x1="12" y1="3" x2="12" y2="15"></line>
                            </svg>
                            Tải File Lên
                        </label>
                        <input type="file" id="fileUpload" accept=".txt,text/*" class="hidden" onchange="ingestFile(this)" />
                    </div>
                    <button id="ingestBtn" onclick="runIngestion()"
                        class="bg-zinc-900 dark:bg-zinc-100 hover:bg-zinc-800 dark:hover:bg-white text-white dark:text-zinc-900 text-[13px] font-medium px-5 py-2.5 rounded-lg transition-all flex items-center gap-2 active:scale-95 shadow-md dark:shadow-sm">
                        <div class="spinner" id="ingestSpinner"></div>
                        <span id="ingestBtnText">Tiến hành Trích xuất</span>
                    </button>
                </div>
            </div>

            <!-- Terminal Output -->
            <div class="mt-8">
                <h3
                    class="text-[12px] font-medium text-zinc-500 uppercase tracking-widest mb-3 border-b border-zinc-200 dark:border-zinc-800 pb-2">
                    Hệ thống Logs & Debug</h3>
                <div class="w-full h-[220px] bg-zinc-50 dark:bg-[#050505] rounded-xl border border-zinc-200 dark:border-zinc-900 p-4 font-mono text-[12px] text-zinc-500 dark:text-zinc-500 overflow-y-auto custom-scrollbar terminal-logs shadow-inner"
                    id="terminal">
                    <p class="italic">Đang chờ nhận dữ liệu tĩnh...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        async function ingestFile(input) {
            const file = input.files[0];
            if (!file) return;

            const term = document.getElementById('terminal');
            const spinner = document.getElementById('ingestSpinner');
            const btn = document.getElementById('ingestBtn');
            const btnText = document.getElementById('ingestBtnText');

            btn.disabled = true;
            btn.classList.add('opacity-50');
            btnText.innerText = "Đang xử lý File...";
            spinner.style.display = 'block';
            term.innerHTML = `<p class="text-zinc-500 dark:text-zinc-400">>[INIT] Đang tải lên và xử lý file: ${file.name}...</p>`;

            const formData = new FormData();
            formData.append("file", file);

            try {
                const response = await fetch('/api/ingest_file', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    data.logs.forEach(log => { term.innerHTML += `<p class="text-zinc-800 dark:text-zinc-300">> ${log}</p>`; });
                    term.innerHTML += `<p class="success mt-2">>[DONE] Đã lưu xong ${data.chunks} vector chunks.</p>`;
                } else {
                    term.innerHTML += `<p class="error mt-2">>[ERROR] ${data.error}</p>`;
                    if (data.logs) { data.logs.forEach(log => term.innerHTML += `<p class="error">> ${log}</p>`); }
                }
            } catch (error) {
                term.innerHTML += `<p class="error mt-2">>[ERR] Mạng lỗi hoặc file quá lớn.</p>`;
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-50');
                btnText.innerText = "Tiến hành Trích xuất";
                spinner.style.display = 'none';
                term.scrollTop = term.scrollHeight;
                input.value = ''; // Reset file input
            }
        }

        async function runIngestion() {
            const rawText = document.getElementById('rawInput').value.trim();
            const btn = document.getElementById('ingestBtn');
            const btnText = document.getElementById('ingestBtnText');
            const spinner = document.getElementById('ingestSpinner');
            const term = document.getElementById('terminal');

            if (!rawText) return;

            btn.disabled = true;
            btn.classList.add('opacity-50');
            btnText.innerText = "Đang kết nối...";
            spinner.style.display = 'block';
            term.innerHTML = '<p class="text-zinc-500 dark:text-zinc-400">>[INIT] Đang gửi dữ liệu tới LLM (gemini-3-flash-preview)...</p>';

            try {
                const response = await fetch('/api/ingest', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ raw_text: rawText })
                });

                const data = await response.json();

                if (response.ok) {
                    data.logs.forEach(log => { term.innerHTML += `<p class="text-zinc-800 dark:text-zinc-300">> ${log}</p>`; });
                    term.innerHTML += `<p class="success mt-2">>[DONE] Đã lưu xong ${data.chunks} vector chunks.</p>`;
                } else {
                    term.innerHTML += `<p class="error mt-2">>[ERROR] ${data.error}</p>`;
                    if (data.logs) { data.logs.forEach(log => term.innerHTML += `<p class="error">> ${log}</p>`); }
                }
            } catch (error) {
                term.innerHTML += `<p class="error mt-2">>[ERR] Network Failed.</p>`;
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-50');
                btnText.innerText = "Tiến hành Trích xuất";
                spinner.style.display = 'none';
                term.scrollTop = term.scrollHeight;
            }
        }
    </script>
</body>

</html>
